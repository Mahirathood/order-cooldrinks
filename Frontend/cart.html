
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - CoolDrinks</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://kit.fontawesome.com/c7cfece0a6.js" crossorigin="anonymous"></script>
</head>
<body>
  <section id="header">
    <div class="logo"><img src="logo.png" alt=""/></div>
    <div>
      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li id="wine"><a href="add-drink.html"><i class="fa-solid fa-martini-glass-citrus"></i>Add</a></li>
        <a href="cart.html" class="active"><i class="fa-solid fa-cart-shopping"></i></a>
        <li><a href="trending_drink.html">Trending</a></li>
        <a href="#" id="close"><i class="fa fa-times"></i></a>
      </ul>
    </div>
  </section>

  <section class="section-p1">
    <h2>Your Shopping Cart</h2>
    <table width="100%">
      <thead>
        <tr>
          <th>Image</th>
          <th>Drink</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="cart-items"></tbody>
    </table>
    <h3 id="grand-total">Grand Total: ₹0</h3>
    <button id="checkout-btn">Proceed to Checkout</button>
  </section>
  <footer><p>&copy; 2025 CoolDrink Online. All rights reserved.</p></footer>
  <script>
    function loadCart() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const cartItems = document.getElementById("cart-items");
      cartItems.innerHTML = "";
      let grandTotal = 0;
      cart.forEach((item, index) => {
        const total = item.price * item.quantity;
        grandTotal += total;
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><img src="${item.imageUrl}" width="80"></td>
          <td>${item.title}</td>
          <td>₹${item.price}</td>
          <td>
            <button onclick="updateQuantity(${index}, -1)">-</button>
            ${item.quantity}
            <button onclick="updateQuantity(${index}, 1)">+</button>
          </td>
          <td>₹${total}</td>
          <td><button onclick="removeItem(${index})">Remove</button></td>
        `;
        cartItems.appendChild(row);});
      document.getElementById("grand-total").textContent = `Grand Total: ₹${grandTotal}`;}
    function updateQuantity(index, change) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      if (!cart[index]) return;
      cart[index].quantity += change;
      if (cart[index].quantity <= 0) {
        cart.splice(index, 1);}
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();}
    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();}
    //Checkout updates sold count in backend
    document.getElementById("checkout-btn").addEventListener("click", async () => {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;}
      const totalAmount = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      try {
        for (let item of cart) {
          await fetch("http://localhost:8090/api/Drinks/sold", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: item.title, quantity: item.quantity })
          });}
        alert(`Checkout successful! Total amount: ₹${totalAmount}`);
        localStorage.removeItem("cart");
        loadCart();
      } catch (err) {
        console.error("Error updating sold count:", err);
        alert("Checkout failed!"); }});
    // Load cart on page load
    loadCart();
  
    const token = localStorage.getItem("token");
    if (!token) {
      window.location.href = "login.html";}
  </script>
  <script src="auth_route.js"></script>
</body>
</html>
