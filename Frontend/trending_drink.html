<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Trending Drinks</title>
<link rel="stylesheet" href="styles.css">
<script src="https://kit.fontawesome.com/c7cfece0a6.js" crossorigin="anonymous"></script>
</head>
<body>
<section id="header">
  <div class="logo"><img src="logo.png" alt=""/></div>
  <div>
      <ul id="navbar">
          <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="About.html">About</a></li>
            <li><a href="contact.html">contact</a></li>
            <li id="wine"><a href="add-drink.html"><i class="fa-solid fa-martini-glass-citrus"></i>Add</a></li>
             <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="#" id="close"><i class="fa fa-times"></i></a>
           <li><a class="active" href="trending_drink.html">Trending</a></li>
      </ul>
  </div>
</section>
<section id="trending" class="section-p1">
  <h2>Trending Drinks</h2>
  <div id="trending-list" class="pro-container"></div>
</section>
<script>
async function loadTrending() {
  try {
    const res = await fetch("http://localhost:8090/api/drinks/trending");
    const data = await res.json();
    const drinks = data.drinks || data;
    const container = document.getElementById("trending-list");
    container.innerHTML = "";
    drinks.forEach(drink => {
                  const card = document.createElement("div");
            card.classList.add("drink-card");
            card.innerHTML = `
              <img src="http://localhost:8090${drink.image}" alt="${drink.title}">
              <div class="drink-info">
                <h4>${drink.title}</h4>
                <p>${drink.details}</p>
                <p class="price">₹${drink.price}</p>
                <p class="location">📍 ${drink.location}</p>
              </div>
              <a href="#" onclick="addToCart('${drink.title}', ${drink.price}, 'http://localhost:8080${drink.image}')" class="cart-btn">
                <i class="fa fa-shopping-cart"></i>
              </a>
            `;
      container.appendChild(card);});
  } catch (err) {
    console.error("Error loading trending drinks:", err); }}
loadTrending();
 setInterval(loadTrending, 1000);
  requireAuth(); // check before showing page
</script>
<script src="auth_route.js"></script>
</body>
</html>
